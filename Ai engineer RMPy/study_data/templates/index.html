<!DOCTYPE html>
<html>
<head>
    <title>AI Student Predictor - Sgivo Lavo</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🎓 AI Student Predictor - Sgivo Lavo</h1>

        <form action="/predict" method="post">
            <input type="number" name="hours" placeholder="Hours studied" required><br>
            <input type="number" name="sleep" placeholder="Sleep hours" required><br>
            <input type="number" name="phone" placeholder="Phone usage" required><br>

            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
            <h2>{{ prediction }}</h2>
        {% endif %}
    </div>

</body>
</html>
